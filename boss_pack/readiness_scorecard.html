<!doctype html>
<html>
<head>
<meta charset='utf-8'>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<title>Readiness Scorecard</title>
<style>
:root{--ink:#16202b;--muted:#657282;--line:#dbe2ea;--soft:#f6f8fa;--blue:#1d5f95}
body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;margin:0;background:#eef2f5;color:var(--ink)}
header,main{max-width:1180px;margin:0 auto}header{padding:24px 20px 10px}main{padding:10px 20px 32px}
h1{margin:0 0 6px;font-size:28px}h2{font-size:18px;margin:22px 0 8px}p{color:var(--muted);line-height:1.45}
.nav{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.nav a,.button{border:1px solid var(--line);border-radius:4px;background:#fff;color:var(--blue);font-weight:700;text-decoration:none;padding:8px 10px;font-size:13px}.nav a.primary,.button.primary{background:var(--blue);border-color:var(--blue);color:#fff}
.panel{background:#fff;border:1px solid var(--line);border-radius:6px;padding:14px;margin:12px 0}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px}.card{border:1px solid var(--line);border-radius:4px;background:var(--soft);padding:10px}.card b{display:block;font-size:22px}.card span{display:block;color:var(--muted);font-size:12px;margin-top:3px}
table{border-collapse:collapse;width:100%;background:#fff;border:1px solid var(--line);font-size:13px}th,td{border-bottom:1px solid var(--line);padding:8px;text-align:left;vertical-align:top}th{background:var(--soft);font-size:11px;text-transform:uppercase;color:#435061}td{overflow-wrap:anywhere}
.downloads{display:flex;gap:8px;flex-wrap:wrap}.small{font-size:12px;color:var(--muted)}
@media print{body{background:#fff}header,main{max-width:none}.nav,.downloads .json{display:none}.panel,table{break-inside:avoid}}
</style>
</head>
<body>
<header>
<h1>Readiness Scorecard</h1>
<p>Microsoft-friendly public view. Use CSV links for Excel, or print this page to PDF.</p>
<nav class='nav'><a class='primary' href='../index.html'>Dashboard</a><a href='index.html'>Boss pack</a><a href='../guide.html'>Guide</a></nav>
</header>
<main>
<section class='panel'><table><thead><tr><th>Metric</th><th>Value</th><th>Status</th></tr></thead><tbody><tr><td></td><td></td><td>ready</td></tr><tr><td></td><td></td><td>ready</td></tr><tr><td></td><td></td><td>ready</td></tr><tr><td></td><td></td><td>blocked</td></tr><tr><td></td><td></td><td>blocked</td></tr></tbody></table></section>
</main>
</body></html>
